name: Release

# Publishes to Maven Central (Sonatype Central Portal) when a version tag is
# pushed. sbt-dynver derives the version from the tag (v0.1.0 -> 0.1.0).
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0          # full history+tags for sbt-dynver

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Import signing key
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback"   >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import

      - name: Publish to Maven Central
        env:
          PGP_KEY_HEX: FEDF83887D777EC053C0B0BC79C4122F7D97ADEC
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: sbt "+publishSigned" sonaRelease
