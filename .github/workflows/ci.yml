name: CI
"on":
  push:
    branches:
      - main
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request: null
jobs:
  verify-gate:
    name: verify-gate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      pull-requests: read
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - name: Skip Verify after merged PR push
        id: check
        run: |
          # Commits landed by merging/squashing a PR are associated with that PR via the API.
          prs=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq "[.[] | select(.merged_at != null and .base.ref == \"${{ github.ref_name }}\")] | length")
          if [ "$prs" -gt 0 ]; then
            echo "Merged PR push — skipping redundant Verify (already ran on the PR)"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
  test:
    name: test
    runs-on: ubuntu-latest
    needs:
      - fmt
      - verify-gate
    if: "!cancelled() && !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' && ((needs.verify-gate.result != 'success') || (needs.verify-gate.outputs.run == 'true'))"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: "0"
      - name: Setup JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
        with:
          disk-cache: "false"
      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.sbt
            ~/.cache/sbt
            ~/.cache/coursier
            target
          key: ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-test
          restore-keys: |
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-
            ubuntu-latest-jdk25-sbt-
      - name: test
        run: sbt 'test; docs/marklitCompile'
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    needs:
      - verify-gate
    if: "!cancelled() && !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' && ((needs.verify-gate.result != 'success') || (needs.verify-gate.outputs.run == 'true'))"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: "0"
      - name: Setup JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
        with:
          disk-cache: "false"
      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.sbt
            ~/.cache/sbt
            ~/.cache/coursier
            target
          key: ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-fmt
          restore-keys: |
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-
            ubuntu-latest-jdk25-sbt-
      - name: fmt
        run: sbt 'scalafmtCheckAll'
  publish:
    name: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      PGP_KEY_HEX: ${{ secrets.PGP_KEY_HEX }}
      PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
      SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: "0"
      - name: Setup JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "25"
      - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
        with:
          disk-cache: "false"
      - name: Cache sbt
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.sbt
            ~/.cache/sbt
            ~/.cache/coursier
            target
          key: ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-publish
          restore-keys: |
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-${{ github.run_id }}-
            ubuntu-latest-jdk25-sbt-0.18.0+2-713c17ae+20260724-1335-
            ubuntu-latest-jdk25-sbt-
      - name: Import signing key
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback"   >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import
        env:
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
      - name: publish
        run: sbt '+publishSigned; sonaRelease'
